<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Detail - HelpHub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="./favicon.jpg" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">H</div>
                <span>HelpHub AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="explore.html">Explore</a></li>
                <li><a href="messages.html">Messages</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 40px 0;">
        <div id="detailHeader"></div>

        <div class="two-col" style="margin-top: 32px;">
            <div>
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-label">AI Summary</div>
                    <div id="aiSummary"></div>
                </div>

                <div class="card">
                    <div class="card-label">Actions</div>
                    <div style="display: flex; gap: 12px; margin-top: 16px;">
                        <button class="btn btn-primary" id="helpBtn">I can help</button>
                        <button class="btn btn-secondary" id="solveBtn">Mark as solved</button>
                    </div>
                </div>
            </div>

            <div>
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-label">Requester</div>
                    <div style="display: flex; align-items: center; gap: 12px; margin-top: 16px;">
                        <div class="avatar">SN</div>
                        <div>
                            <div style="font-weight: 700;">Sara Noor</div>
                            <div style="font-size: 0.875rem; color: var(--text-secondary);">Karachi • Student</div>
                        </div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-label">Helpers</div>
                    <h3 style="margin-bottom: 16px;">People ready to support</h3>
                    <div id="helpersList"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
