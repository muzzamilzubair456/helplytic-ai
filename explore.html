<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - HelpHub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">H</div>
                <span>HelpHub AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="explore.html" class="active">Explore</a></li>
                <li><a href="leaderboard.html">Leaderboard</a></li>
                <li><a href="notifications.html">Notifications</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 40px 0;">
        <div class="hero-banner" style="margin-bottom: 40px;">
            <div class="hero-label">Explore / Feed</div>
            <h1 style="color: white;">Browse help requests with filterable community context.</h1>
            <p style="color: var(--text-light); margin-top: 12px;">
                Filter by category, urgency, skills, and location to surface the best matches.
            </p>
        </div>

        <div class="feed-layout">
            <aside class="sidebar">
                <div class="card-label">Filters</div>
                <h3 style="margin-bottom: 24px;">Refine the feed</h3>
                
                <div class="filter-group">
                    <label class="filter-label">Category</label>
                    <select class="form-select" id="filterCategory">
                        <option value="all">All categories</option>
                        <option>Web Development</option>
                        <option>Design</option>
                        <option>Career</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Urgency</label>
                    <select class="form-select" id="filterUrgency">
                        <option value="all">All urgency levels</option>
                        <option>High</option>
                        <option>Medium</option>
                        <option>Low</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Skills</label>
                    <input type="text" class="form-input" placeholder="React, Figma, Git/GitHub">
                </div>

                <div class="filter-group">
                    <label class="filter-label">Location</label>
                    <input type="text" class="form-input" placeholder="Karachi, Lahore, Remote">
                </div>
            </aside>

            <div id="feedContainer"></div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
