<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - HelpHub AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="./favicon.jpg" type="image/x-icon">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon">H</div>
                <span>HelpHub AI</span>
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Dashboard</a></li>
                <li><a href="index.html">Onboarding</a></li>
                <li><a href="profile.html" class="active">Profile</a></li>
            </ul>
        </div>
    </nav>

    <main class="container" style="padding: 40px 0;">
        <div id="profileHeader"></div>

        <div class="two-col" style="margin-top: 32px;">
            <div class="card">
                <div class="card-label">Public Profile</div>
                <h2 style="margin-bottom: 24px;">Skills and reputation</h2>
                <div id="profileStats"></div>
            </div>

            <div class="card">
                <div class="card-label">Edit Profile</div>
                <h2 style="margin-bottom: 24px;">Update your identity</h2>
                <form id="editProfileForm">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" id="editName">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-input" id="editLocation">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Skills</label>
                        <input type="text" class="form-input" id="editSkills">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Interests</label>
                        <input type="text" class="form-input" id="editInterests">
                    </div>
                    <button type="submit" class="btn btn-primary w-full">Save profile</button>
                </form>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
